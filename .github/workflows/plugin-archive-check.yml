name: Plugin Archive Check

# Guards against the regression that produced v0.3.1: the committed
# .plugin archive drifting from claude-code-plugin/project-lifecycle/.
# Two checks run on every push and pull request:
#   1. Extract the committed archive and diff it against the source tree.
#      Any difference means the archive is stale and must be rebuilt.
#   2. Run scripts/build-plugin.sh to confirm the build script itself
#      still works on this commit.

on:
  push:
  pull_request:

jobs:
  archive-matches-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Committed archive matches source tree
        run: |
          set -euo pipefail
          ARCHIVE="claude-code-plugin/project-lifecycle.plugin"
          SRC="claude-code-plugin/project-lifecycle"

          if [ ! -f "$ARCHIVE" ]; then
            echo "::error::$ARCHIVE is missing"
            exit 1
          fi

          EXTRACT=$(mktemp -d)
          unzip -oq "$ARCHIVE" -d "$EXTRACT"

          # diff -rq returns non-zero if anything differs OR is only on one side.
          set +e
          DIFF_OUT=$(diff -rq "$EXTRACT" "$SRC")
          DIFF_RC=$?
          set -e

          if [ "$DIFF_RC" -ne 0 ] || [ -n "$DIFF_OUT" ]; then
            echo "::error::Committed $ARCHIVE differs from $SRC. Run 'bash scripts/build-plugin.sh' and commit the result."
            echo "$DIFF_OUT"
            exit 1
          fi

      - name: Build script succeeds
        run: bash scripts/build-plugin.sh
